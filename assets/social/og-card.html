<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shortcut Pack OG</title>
    <style>
      :root {
        --bg: #f8f5ee;
        --bg-deep: #f1ecdf;
        --ink: #181612;
        --ink-soft: #5b554c;
        --accent: #9c5c21;
        --line: rgba(24, 22, 18, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(156, 92, 33, 0.1), transparent 26%),
          radial-gradient(circle at 90% 14%, rgba(156, 92, 33, 0.08), transparent 18%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      }

      .canvas {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 370px;
        gap: 42px;
        width: 100%;
        height: 100%;
        padding: 60px 74px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 18px;
      }

      .brand-mark {
        display: inline-grid;
        place-items: center;
        width: 70px;
        height: 70px;
        border-radius: 20px;
        background: var(--ink);
        color: #fbf8f1;
        font-size: 1.5rem;
        font-weight: 800;
      }

      .brand-word,
      h1 {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        letter-spacing: -0.05em;
      }

      .brand-word {
        font-size: 2.25rem;
        font-weight: 700;
      }

      h1 {
        margin: 48px 0 0;
        max-width: 8.5ch;
        font-size: 6.8rem;
        line-height: 0.9;
      }

      p {
        margin: 0;
      }

      .lede {
        max-width: 15ch;
        margin-top: 28px;
        color: var(--ink-soft);
        font-size: 2.05rem;
        line-height: 1.3;
      }

      .panel {
        align-self: center;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.64);
        box-shadow: 0 24px 60px rgba(47, 34, 17, 0.08);
      }

      .panel-label {
        color: var(--ink-soft);
        font-size: 1.05rem;
        font-weight: 700;
      }

      .demo {
        margin-top: 16px;
        display: grid;
        gap: 14px;
      }

      .demo-row {
        padding: 18px;
        border: 1px solid rgba(24, 22, 18, 0.08);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.74);
      }

      .trigger {
        color: var(--accent);
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
        font-size: 1.7rem;
        font-weight: 700;
      }

      .expansion {
        margin-top: 10px;
        color: var(--ink-soft);
        font-size: 1.25rem;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section>
        <div class="brand">
          <span class="brand-mark">SP</span>
          <span class="brand-word">Shortcut Pack</span>
        </div>

        <h1>Type less. Remember less.</h1>
        <p class="lede">Build a pack of Apple text replacements for addresses, IDs, links, and canned replies.</p>
      </section>

      <aside class="panel">
        <p class="panel-label">Starter ideas</p>
        <div class="demo">
          <div class="demo-row">
            <div class="trigger">&gt;home</div>
            <div class="expansion">Home address</div>
          </div>
          <div class="demo-row">
            <div class="trigger">&gt;pp</div>
            <div class="expansion">Passport or ID</div>
          </div>
          <div class="demo-row">
            <div class="trigger">&gt;intro</div>
            <div class="expansion">Saved replies</div>
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
